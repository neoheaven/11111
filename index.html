<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase 채팅</title>

  <!-- Firebase SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #08090f; font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #2a2f45; border-radius: 3px; }

    /* ── 모달 공통 ── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(8,10,18,0.9);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(6px);
    }
    .modal-box {
      background: #12151f; border: 1px solid #2a2f45; border-radius: 20px;
      padding: 44px 40px; width: 360px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .modal-title { color: #e8eaf0; font-weight: 800; font-size: 24px; }
    .modal-sub   { color: #6b7290; font-size: 14px; margin-top: 4px; }

    input.field {
      background: #0d0f1a; border: 1.5px solid #2a2f45; border-radius: 10px;
      padding: 13px 16px; color: #e8eaf0; font-size: 15px; outline: none;
      font-family: 'DM Sans', sans-serif; transition: border-color .2s; width: 100%;
    }
    input.field:focus { border-color: #5c6ef8; }

    .btn-primary {
      background: linear-gradient(135deg, #5c6ef8, #8b5cf6);
      border: none; border-radius: 10px; padding: 13px;
      color: #fff; font-weight: 700; font-size: 15px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; width: 100%;
    }
    .btn-secondary {
      background: #1e2235; border: none; border-radius: 10px; padding: 11px;
      color: #6b7290; font-weight: 600; font-size: 14px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; flex: 1;
    }

    /* ── 레이아웃 ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* 헤더 */
    #header {
      height: 60px; background: #0e1020; border-bottom: 1px solid #1e2235;
      display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0;
    }
    #header .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #5c6ef8, #8b5cf6);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    #header .title    { color: #e8eaf0; font-weight: 800; font-size: 15px; }
    #header .subtitle { display: flex; align-items: center; gap: 5px; }
    #header .dot      { width: 7px; height: 7px; border-radius: 50%; background: #34d399; }
    #header .online   { color: #6b7290; font-size: 11px; }

    #nick-btn {
      display: flex; align-items: center; gap: 8px; margin-left: auto;
      background: #1a1d2e; border: 1px solid #2a2f45; border-radius: 24px;
      padding: 6px 14px 6px 8px; cursor: pointer; transition: border-color .2s;
    }
    #nick-btn:hover { border-color: #5c6ef8; }
    #nick-btn .nick-label { color: #cdd1e6; font-size: 13px; font-weight: 600; }
    #nick-btn .nick-edit  { color: #6b7290; font-size: 11px; }

    /* 메시지 영역 */
    #messages { flex: 1; overflow-y: auto; padding: 14px 0; display: flex; flex-direction: column; gap: 2px; }

    #empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
    }
    #empty .emoji { font-size: 48px; }
    #empty .main  { color: #6b7290; font-weight: 700; font-size: 16px; }
    #empty .sub   { color: #404565; font-size: 13px; }

    /* 메시지 버블 */
    .msg-row {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 6px 16px; border-radius: 8px; position: relative;
      transition: background .15s;
    }
    .msg-row:hover { background: #1a1d2e; }
    .msg-row:hover .del-btn { display: block; }

    .avatar {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 800; flex-shrink: 0;
    }
    .msg-nick  { font-weight: 700; font-size: 14px; }
    .msg-time  { color: #404565; font-size: 11px; margin-left: 8px; }
    .msg-me    { color: #404565; font-weight: 400; font-size: 11px; margin-left: 5px; }
    .msg-text  { color: #cdd1e6; font-size: 14.5px; line-height: 1.55; word-break: break-word; margin-top: 3px; }
    .msg-img   {
      max-width: 280px; max-height: 220px; border-radius: 10px;
      cursor: zoom-in; border: 1px solid #2a2f45; display: block; margin-top: 3px;
    }

    .del-btn {
      display: none;
      position: absolute; top: 6px; right: 12px;
      background: #2a1a1a; border: 1px solid #5a2a2a;
      color: #f87171; border-radius: 8px; padding: 4px 10px;
      font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600;
    }
    .del-btn:hover { background: #3d1a1a; }

    /* 입력창 */
    #input-area {
      border-top: 1px solid #1e2235; padding: 12px 16px;
      background: #0e1020; flex-shrink: 0;
    }
    #input-box {
      display: flex; gap: 8px; align-items: flex-end;
      background: #12151f; border: 1.5px solid #2a2f45;
      border-radius: 14px; padding: 8px 8px 8px 14px;
      transition: border-color .2s;
    }
    #input-box:focus-within { border-color: #5c6ef8; }
    #msg-input {
      flex: 1; background: transparent; border: none; color: #e8eaf0;
      font-size: 14.5px; outline: none; font-family: 'DM Sans', sans-serif;
      line-height: 1.5; max-height: 120px; overflow-y: auto; resize: none;
    }
    #img-btn {
      background: none; border: none; color: #6b7290; font-size: 20px;
      cursor: pointer; padding: 4px 6px; border-radius: 8px; line-height: 1;
      transition: color .15s;
    }
    #img-btn:hover { color: #5c6ef8; }
    #send-btn {
      background: linear-gradient(135deg, #5c6ef8, #8b5cf6);
      border: none; border-radius: 10px; padding: 8px 16px;
      color: #fff; font-weight: 700; font-size: 13px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; white-space: nowrap;
    }
    #send-btn:disabled { background: #1e2235; color: #404565; cursor: default; }
    #input-hint { color: #404565; font-size: 11px; margin-top: 6px; text-align: center; }

    /* 이미지 확대 */
    #img-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: none; align-items: center; justify-content: center;
      z-index: 200; cursor: zoom-out;
    }
    #img-modal.open { display: flex; }
    #img-modal img  { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
  </style>
</head>
<body>

<!-- ════════════════════════════════════
     닉네임 설정 모달
════════════════════════════════════ -->
<div id="nick-modal" class="modal-bg">
  <div class="modal-box">
    <div>
      <div class="modal-title">👋 환영합니다</div>
      <div class="modal-sub">채팅에서 사용할 닉네임을 설정하세요</div>
    </div>
    <input id="nick-input-first" class="field" maxlength="16" placeholder="닉네임 입력 (최대 16자)" />
    <button class="btn-primary" onclick="submitFirstNick()">입장하기</button>
  </div>
</div>

<!-- ════════════════════════════════════
     닉네임 변경 모달
════════════════════════════════════ -->
<div id="change-nick-modal" class="modal-bg" style="display:none">
  <div class="modal-box" style="padding:36px 32px; width:320px;">
    <div class="modal-title" style="font-size:20px">닉네임 변경</div>
    <input id="nick-input-change" class="field" maxlength="16" placeholder="새 닉네임 입력" />
    <div style="display:flex; gap:10px;">
      <button class="btn-secondary" onclick="closeChangeNick()">취소</button>
      <button class="btn-primary" style="flex:1; padding:11px" onclick="submitChangeNick()">변경</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════
     이미지 확대 모달
════════════════════════════════════ -->
<div id="img-modal" onclick="closeImgModal()">
  <img id="img-modal-src" src="" alt="확대 이미지" onclick="event.stopPropagation()" />
</div>

<!-- ════════════════════════════════════
     메인 앱
════════════════════════════════════ -->
<div id="app" style="display:none">

  <!-- 헤더 -->
  <div id="header">
    <div class="logo">🔥</div>
    <div>
      <div class="title">Firebase 채팅</div>
      <div class="subtitle">
        <div class="dot"></div>
        <span class="online" id="online-count">접속 중...</span>
      </div>
    </div>
    <button id="nick-btn" onclick="openChangeNick()">
      <div id="header-avatar" class="avatar" style="width:26px;height:26px;font-size:11px"></div>
      <span class="nick-label" id="header-nick"></span>
      <span class="nick-edit">✏️</span>
    </button>
  </div>

  <!-- 메시지 목록 -->
  <div id="messages">
    <div id="empty">
      <div class="emoji">🔥</div>
      <div class="main">첫 메시지를 보내보세요!</div>
      <div class="sub">Firebase로 연결된 실시간 채팅입니다</div>
    </div>
  </div>

  <!-- 입력창 -->
  <div id="input-area">
    <div id="input-box">
      <textarea id="msg-input" rows="1"
        placeholder="메시지 입력..."
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"></textarea>
      <input id="file-input" type="file" accept="image/*" style="display:none" onchange="handleImage(event)" />
      <button id="img-btn" onclick="document.getElementById('file-input').click()" title="이미지 전송">📷</button>
      <button id="send-btn" disabled onclick="sendMessage()">전송 ↑</button>
    </div>
    <div id="input-hint">Enter 전송 · Shift+Enter 줄바꿈 · 이미지 3MB 이하 · 내 메시지에 마우스 올리면 삭제</div>
  </div>
</div>

<!-- ════════════════════════════════════
     스크립트
════════════════════════════════════ -->
<script>
// ──────────────────────────────────────
// 🔥 여기에 Firebase 설정을 붙여넣으세요
// ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyD9UwJVDpsAVBecMPAPhLKm9dM4-3NDopU",
  authDomain: "test1-7e357.firebaseapp.com",
  databaseURL: "https://test1-7e357-default-rtdb.firebaseio.com",
  projectId: "test1-7e357",
  storageBucket: "test1-7e357.firebasestorage.app",
  messagingSenderId: "512007194016",
  appId: "1:512007194016:web:455ae5a98d1963853e90c5"
};

// ── 초기화 ──────────────────────────
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── 유저 ID (탭마다 고유) ────────────
function getMyId() {
  let id = sessionStorage.getItem("uid");
  if (!id) { id = Math.random().toString(36).slice(2); sessionStorage.setItem("uid", id); }
  return id;
}
const MY_ID = getMyId();

// ── 닉네임 ──────────────────────────
let myNick = sessionStorage.getItem("nick") || "";

// ── 컬러 팔레트 ─────────────────────
const COLORS = ["#60a5fa","#34d399","#f472b6","#a78bfa","#fb923c","#38bdf8","#4ade80","#e879f9"];
function userColor(uid) {
  let h = 0;
  for (const c of uid) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}

// ── 아바타 HTML ──────────────────────
function avatarHtml(nick, uid, size) {
  const col = userColor(uid);
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${size*0.42}px;
    background:${col}20;border:2px solid ${col};color:${col}">
    ${(nick||"?")[0].toUpperCase()}</div>`;
}

// ════════════════════════════════════
// 닉네임 모달
// ════════════════════════════════════
function submitFirstNick() {
  const val = document.getElementById("nick-input-first").value.trim();
  if (!val) return;
  myNick = val;
  sessionStorage.setItem("nick", val);
  document.getElementById("nick-modal").style.display = "none";
  initApp();
}
document.getElementById("nick-input-first").addEventListener("keydown", e => {
  if (e.key === "Enter") submitFirstNick();
});

function openChangeNick() {
  document.getElementById("nick-input-change").value = myNick;
  document.getElementById("change-nick-modal").style.display = "flex";
  document.getElementById("nick-input-change").focus();
}
function closeChangeNick() {
  document.getElementById("change-nick-modal").style.display = "none";
}
function submitChangeNick() {
  const val = document.getElementById("nick-input-change").value.trim();
  if (!val) return;
  myNick = val;
  sessionStorage.setItem("nick", val);
  updateHeaderNick();
  closeChangeNick();
  document.getElementById("msg-input").placeholder = `${myNick}으로 메시지 보내기...`;
}
document.getElementById("nick-input-change").addEventListener("keydown", e => {
  if (e.key === "Enter") submitChangeNick();
});

// 헤더 닉네임 갱신
function updateHeaderNick() {
  document.getElementById("header-nick").textContent = myNick;
  const av = document.getElementById("header-avatar");
  const col = userColor(MY_ID);
  av.style.background = `${col}20`;
  av.style.border = `2px solid ${col}`;
  av.style.color = col;
  av.textContent = myNick[0].toUpperCase();
}

// ════════════════════════════════════
// 앱 초기화 (닉네임 설정 후)
// ════════════════════════════════════
function initApp() {
  document.getElementById("app").style.display = "flex";
  updateHeaderNick();
  document.getElementById("msg-input").placeholder = `${myNick}으로 메시지 보내기...`;
  listenMessages();
  trackPresence();

  // 닉네임이 이미 있으면 모달 없이 바로 시작
  if (myNick) {
    document.getElementById("nick-modal").style.display = "none";
  }
}

// 페이지 로드 시: 닉네임 있으면 바로 앱 진입
if (myNick) {
  document.getElementById("nick-modal").style.display = "none";
  initApp();
}

// ════════════════════════════════════
// Firebase 실시간 메시지
// ════════════════════════════════════
function listenMessages() {
  const msgRef = db.ref("messages").limitToLast(200);
  msgRef.on("value", snap => {
    const data = snap.val() || {};
    const list = Object.entries(data)
      .map(([key, val]) => ({ key, ...val }))
      .sort((a, b) => (a.ts || 0) - (b.ts || 0));
    renderMessages(list);
  });
}

function renderMessages(list) {
  const container = document.getElementById("messages");
  const empty = document.getElementById("empty");
  empty.style.display = list.length === 0 ? "flex" : "none";

  // 기존 메시지 행만 제거
  container.querySelectorAll(".msg-row").forEach(el => el.remove());

  list.forEach(msg => {
    const isMe = msg.uid === MY_ID;
    const col = userColor(msg.uid);
    const time = new Date(msg.ts).toLocaleTimeString("ko-KR", {hour:"2-digit", minute:"2-digit"});

    const row = document.createElement("div");
    row.className = "msg-row";
    row.dataset.key = msg.key;

    const content = msg.type === "image"
      ? `<img class="msg-img" src="${msg.content}" alt="이미지" onclick="openImgModal('${msg.content}')" />`
      : `<div class="msg-text">${escapeHtml(msg.content)}</div>`;

    const deleteBtn = isMe
      ? `<button class="del-btn" onclick="deleteMsg('${msg.key}')">🗑 삭제</button>`
      : "";

    row.innerHTML = `
      ${avatarHtml(msg.nick, msg.uid, 36)}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:baseline;">
          <span class="msg-nick" style="color:${col}">${escapeHtml(msg.nick)}
            ${isMe ? '<span class="msg-me">(나)</span>' : ''}
          </span>
          <span class="msg-time">${time}</span>
        </div>
        ${content}
      </div>
      ${deleteBtn}
    `;
    container.appendChild(row);
  });

  // 스크롤 맨 아래로
  container.scrollTop = container.scrollHeight;
}

// ════════════════════════════════════
// 메시지 전송
// ════════════════════════════════════
function sendMessage(content, type = "text") {
  const payload = { uid: MY_ID, nick: myNick, content, type, ts: Date.now() };
  db.ref("messages").push(payload);
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const val = document.getElementById("msg-input").value.trim();
    if (!val) return;
    sendMessage(val);
    document.getElementById("msg-input").value = "";
    document.getElementById("msg-input").style.height = "auto";
    document.getElementById("send-btn").disabled = true;
  }
}

document.getElementById("msg-input").addEventListener("input", function() {
  document.getElementById("send-btn").disabled = !this.value.trim();
});

document.getElementById("send-btn").addEventListener("click", function() {
  const val = document.getElementById("msg-input").value.trim();
  if (!val) return;
  sendMessage(val);
  document.getElementById("msg-input").value = "";
  document.getElementById("msg-input").style.height = "auto";
  this.disabled = true;
});

// ════════════════════════════════════
// 이미지 전송
// ════════════════════════════════════
function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 3 * 1024 * 1024) { alert("이미지는 3MB 이하만 가능합니다."); return; }
  const reader = new FileReader();
  reader.onload = ev => sendMessage(ev.target.result, "image");
  reader.readAsDataURL(file);
  e.target.value = "";
}

// ════════════════════════════════════
// 메시지 삭제
// ════════════════════════════════════
function deleteMsg(key) {
  db.ref(`messages/${key}`).remove();
}

// ════════════════════════════════════
// 접속자 수 (Presence)
// ════════════════════════════════════
function trackPresence() {
  const myRef = db.ref(`presence/${MY_ID}`);
  myRef.set(true);
  myRef.onDisconnect().remove();

  db.ref("presence").on("value", snap => {
    const count = Object.keys(snap.val() || {}).length;
    document.getElementById("online-count").textContent = `${count}명 접속 중`;
  });
}

// ════════════════════════════════════
// 유틸
// ════════════════════════════════════
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function openImgModal(src) {
  document.getElementById("img-modal-src").src = src;
  document.getElementById("img-modal").classList.add("open");
}
function closeImgModal() {
  document.getElementById("img-modal").classList.remove("open");
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/\n/g,"<br>");
}
</script>
</body>
</html>
